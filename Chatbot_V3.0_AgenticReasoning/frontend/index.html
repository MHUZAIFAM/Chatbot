<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Chats</h2>

    <button onclick="newChat()">+ New chats</button>
    <button onclick="searchChats()">🔍 Search chats</button>

    <hr>

    <h3>Recents</h3>
    <div id="recents"></div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area">

    <div class="header">Isentia Bot</div>

    <!-- EMPTY STATE -->
    <div id="emptyState" class="empty-state">
      <h2>Ready when you are!</h2>

      <div class="prompt-bar center">
        <input id="inputCenter" placeholder="Ask anything..." />
        <button onclick="sendMessageCenter()">➤</button>
      </div>
    </div>

    <!-- CHAT MODE -->
    <div id="chatContainer" class="chat-container hidden">

      <div id="messages" class="messages"></div>

      <div class="prompt-bar bottom">
        <input id="inputBottom" placeholder="Ask anything..." />
        <button id="sendBtn" onclick="handleSend()">➤</button>
      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
